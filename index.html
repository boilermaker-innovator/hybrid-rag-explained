<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>iTabs | Hybrid RAG Explained</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg-primary: #0a0a0f; --bg-secondary: #12121a; --bg-tertiary: #1e1e2e;
            --text-primary: #ffffff; --text-secondary: #9090b0;
            --accent: #7c3aed; --accent2: #06b6d4; --i-button: #f59e0b;
            --card-radius: 16px; --transition: 0.2s ease;
        }
        html, body { height: 100%; overflow: hidden; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg-primary); color: var(--text-primary); line-height: 1.5; }
        .container { max-width: 430px; margin: 0 auto; height: 100%; display: flex; flex-direction: column; position: relative; }

        .progress-container { display: flex; gap: 4px; padding: 12px 16px 8px; position: absolute; top: 0; left: 0; right: 0; z-index: 100; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); }
        .progress-segment { flex: 1; height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px; transition: background var(--transition); }
        .progress-segment.viewed { background: rgba(255,255,255,0.6); }
        .progress-segment.active { background: var(--accent); }

        .cards-wrapper { flex: 1; position: relative; overflow: hidden; }
        .card { position: absolute; inset: 0; display: flex; flex-direction: column; opacity: 0; transform: translateX(100%); transition: all 0.3s ease; pointer-events: none; }
        .card.active { opacity: 1; transform: translateX(0); pointer-events: all; }
        .card.prev { opacity: 0; transform: translateX(-100%); }

        .card-hero { padding: 52px 20px 20px; min-height: 38%; display: flex; flex-direction: column; justify-content: flex-end; }
        .hero-default { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .hero-purple  { background: linear-gradient(135deg, #4c1d95 0%, #1e1b4b 100%); }
        .hero-cyan    { background: linear-gradient(135deg, #164e63 0%, #0c4a6e 100%); }
        .hero-amber   { background: linear-gradient(135deg, #78350f 0%, #431407 100%); }
        .hero-green   { background: linear-gradient(135deg, #14532d 0%, #052e16 100%); }
        .hero-red     { background: linear-gradient(135deg, #7f1d1d 0%, #450a0a 100%); }

        .card-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 8px; }
        .tag-purple { color: #a78bfa; } .tag-cyan { color: #67e8f9; } .tag-amber { color: #fcd34d; } .tag-green { color: #6ee7b7; } .tag-red { color: #fca5a5; }
        .card-headline { font-size: clamp(20px, 5vw, 26px); font-weight: 700; line-height: 1.25; }
        .hero-default em { color: #cbd5e1; font-style: normal; }
        .hero-purple  em { color: #a78bfa; font-style: normal; }
        .hero-cyan    em { color: #67e8f9; font-style: normal; }
        .hero-amber   em { color: #fcd34d; font-style: normal; }
        .hero-green   em { color: #6ee7b7; font-style: normal; }
        .hero-red     em { color: #fca5a5; font-style: normal; }

        .card-body { flex: 1; padding: 20px; background: var(--bg-secondary); overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
        .card-summary { font-size: 15px; color: var(--text-secondary); line-height: 1.7; }
        .analogy-box { background: var(--bg-tertiary); border-radius: 12px; padding: 14px; border-left: 3px solid var(--accent2); }
        .analogy-title { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent2); margin-bottom: 6px; }
        .analogy-text { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
        .i-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
        .i-button { display: flex; align-items: center; gap: 6px; padding: 8px 14px; background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.3); border-radius: 20px; color: var(--i-button); font-size: 13px; font-weight: 600; cursor: pointer; transition: all var(--transition); font-family: inherit; }
        .i-button:hover { background: rgba(245,158,11,0.22); }
        .i-dot { width: 18px; height: 18px; background: var(--i-button); color: #000; border-radius: 50%; font-size: 11px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

        .nav-area { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px 20px; background: var(--bg-secondary); border-top: 1px solid rgba(255,255,255,0.06); }
        .nav-btn { width: 44px; height: 44px; background: rgba(255,255,255,0.08); border: none; border-radius: 50%; color: var(--text-primary); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all var(--transition); }
        .nav-btn:hover:not(:disabled) { background: rgba(255,255,255,0.14); }
        .nav-btn:disabled { opacity: 0.25; cursor: default; }
        .card-counter { font-size: 13px; color: var(--text-secondary); font-weight: 500; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity var(--transition); z-index: 200; }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal-sheet { width: 100%; max-width: 430px; background: var(--bg-tertiary); border-radius: 20px 20px 0 0; padding: 20px; transform: translateY(100%); transition: transform 0.3s ease; }
        .modal-overlay.active .modal-sheet { transform: translateY(0); }
        .modal-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin: 0 auto 16px; }
        .modal-term { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
        .modal-type { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--i-button); margin-bottom: 12px; }
        .modal-content { font-size: 14px; color: var(--text-secondary); line-height: 1.7; }
        .modal-close { margin-top: 20px; width: 100%; padding: 12px; background: rgba(255,255,255,0.08); border: none; border-radius: 10px; color: var(--text-primary); font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
    </style>
</head>
<body>
<div class="container">
    <div class="progress-container" id="progress"></div>
    <div class="cards-wrapper" id="cardsWrapper"></div>
    <div class="nav-area">
        <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">←</button>
        <span class="card-counter" id="counter">1 / 11</span>
        <button class="nav-btn" id="nextBtn" onclick="navigate(1)">→</button>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-term" id="modalTerm"></div>
        <div class="modal-type" id="modalType"></div>
        <div class="modal-content" id="modalContent"></div>
        <button class="modal-close" onclick="closeModal()">Close</button>
    </div>
</div>

<script>
const cards = [
    {
        tag: "01 / INTRO",
        tagClass: "",
        headline: "AI Can't Find What It <em>Doesn't Know</em> It Has",
        heroClass: "hero-default",
        summary: "The presenter had a massive eBook library — hundreds of books full of insights. The problem? Keyword search found books on topics but couldn't surface specific ideas buried inside them. Standard AI tools weren't cutting it.",
        analogy: { title: "Think of it like...", text: "A warehouse full of filing cabinets. You can find the right cabinet, but not the specific note inside the folder inside the drawer." },
        iButtons: [
            { label: "The goal", type: "why-it-matters", term: "Hidden Knowledge", content: "Most large document collections have incredible depth that's completely inaccessible. The goal of this project was to unlock cross-book insights — finding what multiple authors say about the same topic, not just which book covers that topic." }
        ]
    },
    {
        tag: "02 / BASICS",
        tagClass: "tag-purple",
        headline: "RAG Is Your AI's <em>Filing Cabinet</em>",
        heroClass: "hero-purple",
        summary: "RAG stands for Retrieval-Augmented Generation. Instead of relying on an AI's memory alone, you give it a filing cabinet of your own documents to search before answering. The AI finds relevant chunks, then uses them as context to generate a grounded answer.",
        analogy: { title: "The pipeline:", text: "Documents → split into chunks → convert to vectors → store in database. At query time: search for similar chunks → feed them to the LLM → get a grounded answer." },
        iButtons: [
            { label: "What is RAG", type: "definition", term: "RAG", content: "Retrieval-Augmented Generation. A technique where an AI searches a database of your documents before generating a response, so the answer is grounded in real content rather than general training data." },
            { label: "Why not just ChatGPT", type: "why-it-matters", term: "Why RAG", content: "General AI models don't know your specific documents. RAG lets you point the AI at your own content — manuals, books, past quotes, safety docs — so it answers from your data, not guesswork." }
        ]
    },
    {
        tag: "03 / CONCEPTS",
        tagClass: "tag-purple",
        headline: "Three Words You Need: <em>Chunks, Embeddings, Vectors</em>",
        heroClass: "hero-purple",
        summary: "Before AI can search your documents, they need to be prepared. Documents get broken into chunks (small pieces of text). Each chunk gets converted into an embedding (a numerical fingerprint). That fingerprint is stored as a vector — a list of numbers that captures meaning.",
        analogy: { title: "Think of it like...", text: "'King' − 'Man' + 'Woman' = 'Queen' in vector space. Words with similar meanings end up close together as numbers. That's how AI finds related content." },
        iButtons: [
            { label: "Chunks", type: "definition", term: "Chunks", content: "Documents are broken into 500–1000 token pieces, with slight overlap so topics don't get cut in half. Smart chunking uses sentence boundaries so a topic is never split mid-thought." },
            { label: "Embeddings", type: "definition", term: "Embeddings", content: "Machine learning models (like SentenceTransformers) convert text into a list of numbers — typically 384 dimensions — that captures the semantic meaning. Similar text produces similar numbers." },
            { label: "Vectors", type: "definition", term: "Vectors", content: "The numerical representation of text, stored in a vector database. When you search, your query also becomes a vector and the database finds chunks with the closest numbers — meaning closest meaning." }
        ]
    },
    {
        tag: "04 / VISUAL",
        tagClass: "tag-cyan",
        headline: "Similar Words <em>Cluster Together</em> in Space",
        heroClass: "hero-cyan",
        summary: "Imagine a 3D map where every word or phrase is a dot. 'King', 'Queen', 'Prince', 'Royal' all cluster together. 'Banana' and 'Galaxy' are far away. When you search, AI finds the dots nearest to your query — that's semantic search.",
        analogy: { title: "Real example from the slides:", text: "The presentation showed 'king', 'queen', 'prince', 'royal' all clustered tightly together, while 'umbrella', 'banana', 'galaxy', 'democracy' scattered far apart. Real embeddings have 384+ dimensions, not just 3." },
        iButtons: [
            { label: "Why this beats keywords", type: "why-it-matters", term: "Semantic Search", content: "Keyword search only finds exact matches. Vector search finds meaning. Search for 'affordable vehicle' and it finds results about 'cheap cars' too. This is why AI search feels smarter than Google for specific document questions." }
        ]
    },
    {
        tag: "05 / MECHANICS",
        tagClass: "tag-cyan",
        headline: "How Text <em>Becomes Numbers</em>: Tokenisation",
        heroClass: "hero-cyan",
        summary: "Before text becomes a vector, it gets broken into tokens — sub-word pieces. 'Happiness' becomes 'happi' + 'ness'. This means AI only needs 50K tokens to cover millions of words, and can handle words it's never seen before by breaking them into familiar parts.",
        analogy: { title: "From the slides:", text: "Word tokens (19): [Tokenisers, break, words, into...] vs Subword tokens (27): [Token, isers, break, words, into, sub, word...] — more pieces, but smarter coverage." },
        iButtons: [
            { label: "Why subwords", type: "why-it-matters", term: "Subword Tokenisation", content: "Modern LLMs use BPE (Byte Pair Encoding), WordPiece, or Unigram tokenisation. It balances vocabulary size vs coverage. A word like 'unhallucinationable' can be broken into known parts even if the model never saw that word in training." }
        ]
    },
    {
        tag: "06 / SELF-ATTENTION",
        tagClass: "tag-purple",
        headline: "Words Look at Each Other to <em>Understand Context</em>",
        heroClass: "hero-purple",
        summary: "Self-attention is the core idea inside transformer models. Every word 'looks at' every other word to understand its meaning in context. Without it, 'brown' in 'the quick brown fox' is just a colour. With self-attention, 'brown' knows it's describing a fox.",
        analogy: { title: "The key insight:", text: "With self-attention: 'brown' looks at 'The' (weak), 'quick' (weak), 'fox' (strong). Now 'brown' knows: I'm describing the fox. This is what lets embeddings capture true meaning, not just word identity." },
        iButtons: [
            { label: "Self-Attention", type: "definition", term: "Self-Attention", content: "A mechanism where each word in a sequence attends to every other word, building a context-aware representation. It's the reason transformers (like the models behind ChatGPT and Claude) understand meaning instead of just matching words." }
        ]
    },
    {
        tag: "07 / ARCHITECTURE",
        tagClass: "tag-amber",
        headline: "Two Paths Are Better Than <em>One</em>",
        heroClass: "hero-amber",
        summary: "The 'hybrid' in Hybrid RAG means running two parallel search systems. The Vector Path handles semantic search — finding similar text. The Graph Path handles structure — understanding how concepts connect. Together they cover what neither can do alone.",
        analogy: { title: "Why hybrid matters:", text: "Vector search finds similar text. Graph search understands how things are connected. 'Dependency A requires Tool B' is a relationship — vectors miss that. Graphs catch it." },
        iButtons: [
            { label: "Vector Path", type: "definition", term: "Vector Path", content: "Documents chunked at 3,500 chars, embedded with Sentence Transformers, stored in ChromaDB. Great for fuzzy semantic search — finding content that means something similar to your query." },
            { label: "Graph Path", type: "definition", term: "Graph Path", content: "Entities and concepts extracted from documents, relationships mapped between them, stored in Neo4j graph database. Great for structured questions like 'what depends on what' or 'how are these things connected'." }
        ]
    },
    {
        tag: "08 / CHROMADB",
        tagClass: "tag-cyan",
        headline: "ChromaDB: Your <em>Vector Search</em> Engine",
        heroClass: "hero-cyan",
        summary: "ChromaDB is the database that stores and searches all those number-fingerprints (vectors). It uses HNSW indexing for lightning-fast approximate search across millions of vectors, and cosine similarity to rank results by how close their meaning is to your query.",
        analogy: null,
        iButtons: [
            { label: "HNSW", type: "definition", term: "HNSW Indexing", content: "Hierarchical Navigable Small World — a graph-based index for fast approximate nearest neighbour search. It builds multi-layer graph structures with a 'skip list' approach, achieving logarithmic O(log n) search time. The trade-off: speed vs perfect accuracy." },
            { label: "Cosine similarity", type: "definition", term: "Cosine Similarity", content: "The maths used to compare two vectors. It measures the angle between them in multi-dimensional space. A score of 1.0 means identical meaning, 0 means completely unrelated. ChromaDB uses this to rank search results." }
        ]
    },
    {
        tag: "09 / NEO4J",
        tagClass: "tag-purple",
        headline: "Neo4j: Where <em>Relationships</em> Live",
        heroClass: "hero-purple",
        summary: "Neo4j is a graph database — it stores not just facts but how facts connect. A document MENTIONS a concept. A concept IS_A type of thing. 'FastAPI' USED_FOR 'REST API'. Every relationship has a confidence score from 0.0 to 1.0 based on extraction strength.",
        analogy: { title: "Graph Schema from the slides:", text: "(:Document)-[:MENTIONS]->(:Concept) | (:Document)-[:CLASSIFIED_AS]->(:Category) | (:Concept)-[:RELATED_TO]->(:Concept)" },
        iButtons: [
            { label: "Graph vs Vector", type: "context", term: "Graph Database", content: "Vector databases find similar content. Graph databases find connected content. If you ask 'what tools are used for REST APIs', a graph can traverse relationships to find the answer — vectors would just find text that mentions REST APIs nearby." },
            { label: "Deduplication", type: "definition", term: "Deduplication", content: "Concepts merge on normalised names across documents. If Book A and Book B both mention 'machine learning', they link to the same concept node — not two separate ones. This creates a unified knowledge graph across your entire library." }
        ]
    },
    {
        tag: "10 / THE PROBLEM",
        tagClass: "tag-red",
        headline: "The Hardest Part: <em>Extracting Relationships</em>",
        heroClass: "hero-red",
        summary: "Old NLP just noticed when two words appeared near each other and called them 'related'. That gives you generic RELATED_TO edges everywhere — useless. LLMs can actually infer the type of relationship: IS_A, USED_FOR, HAS_PART, IMPLEMENTS. That's the real breakthrough.",
        analogy: { title: "The current challenge:", text: "The pipeline extracts relationships 'blindly' — sending a list of concepts to the LLM without the source text. The future fix: LLM needs both the source text AND the concepts to accurately determine why they're related." },
        iButtons: [
            { label: "NLP failure mode", type: "context", term: "NLP Co-occurrence", content: "Traditional NLP relies on co-occurrence statistics: if 'Python' and 'Slow' appear in the same sentence, it creates a relationship. The result is generic edges that tell you proximity, not causality. Not useful for real knowledge graphs." },
            { label: "LLM solution", type: "why-it-matters", term: "Semantic Relationship Extraction", content: "LLMs infer semantic relationship types from context. 'FastAPI USED_FOR REST API' and 'ChromaDB IS_A vector database' are meaningful, typed relationships. This turns a word list into a real knowledge network." }
        ]
    },
    {
        tag: "11 / TAKEAWAY",
        tagClass: "tag-green",
        headline: "Build From Scratch to <em>Understand the Why</em>",
        heroClass: "hero-green",
        summary: "The key insight from the presenter: building this from scratch instead of using off-the-shelf RAG revealed why every design choice exists. The chunking strategy, the dual-path architecture, the relationship extraction — each solved a real problem he discovered by building it himself.",
        analogy: { title: "Relevant for iTabs?", text: "Any tradie with a library of manuals, past quotes, or safety docs could use this kind of system to answer job-specific questions from their own data. Not someday — the building blocks are all open source." },
        iButtons: [
            { label: "Full system stack", type: "context", term: "NexusRAG Stack", content: "Input: PDF/EPUB/MD via drag-drop UI or CLI. Processing: semantic chunking (NLTK), classification (18 cats, 800+ keywords), LLM concept extraction, async job manager. Storage: ChromaDB (vectors), Neo4j (graph), SQLite (job persistence). Retrieval: semantic search, graph traversal, agentic multi-step search. Access: REST API, Web UI, MCP Server." },
            { label: "What to explore next", type: "related", term: "Next Steps", content: "If this interests you: start with ChromaDB and sentence-transformers (both free and local). Build a simple vector search over your own documents. Once that clicks, add Neo4j for relationships. The presenter's code is at github.com/andyspamer/nexusrag." }
        ]
    }
];

let currentCard = 0;
const totalCards = cards.length;
const modalOverlay = document.getElementById('modalOverlay');
const modalTerm = document.getElementById('modalTerm');
const modalType = document.getElementById('modalType');
const modalContent = document.getElementById('modalContent');

function init() {
    const progress = document.getElementById('progress');
    const wrapper = document.getElementById('cardsWrapper');
    cards.forEach((card, i) => {
        const seg = document.createElement('div');
        seg.className = 'progress-segment' + (i === 0 ? ' active' : '');
        progress.appendChild(seg);
        wrapper.appendChild(buildCard(card, i));
    });
    document.getElementById('counter').textContent = `1 / ${totalCards}`;
    document.getElementById('prevBtn').disabled = true;
    document.addEventListener('keydown', e => {
        if (e.key === 'ArrowRight') navigate(1);
        if (e.key === 'ArrowLeft') navigate(-1);
        if (e.key === 'Escape') closeModal();
    });
    let startX = 0;
    const cw = document.getElementById('cardsWrapper');
    cw.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
    cw.addEventListener('touchend', e => {
        const diff = startX - e.changedTouches[0].clientX;
        if (Math.abs(diff) > 50) navigate(diff > 0 ? 1 : -1);
    });
}

function buildCard(card, index) {
    const el = document.createElement('div');
    el.className = 'card' + (index === 0 ? ' active' : '');
    const analogyHTML = card.analogy ? `<div class="analogy-box"><div class="analogy-title">${card.analogy.title}</div><div class="analogy-text">${card.analogy.text}</div></div>` : '';
    const iButtonsHTML = card.iButtons.length ? `<div class="i-buttons">${card.iButtons.map(b => `<button class="i-button" data-term="${b.term}" data-type="${b.type}" data-content="${encodeURIComponent(b.content)}"><span class="i-dot">i</span>${b.label}</button>`).join('')}</div>` : '';
    el.innerHTML = `
        <div class="card-hero ${card.heroClass}">
            <div class="card-tag ${card.tagClass}">${card.tag}</div>
            <h2 class="card-headline">${card.headline}</h2>
        </div>
        <div class="card-body">
            <p class="card-summary">${card.summary}</p>
            ${analogyHTML}
            ${iButtonsHTML}
        </div>`;
    el.querySelectorAll('.i-button').forEach(btn => {
        btn.addEventListener('click', e => {
            e.stopPropagation();
            openModal(btn.dataset.term, btn.dataset.type, decodeURIComponent(btn.dataset.content));
        });
    });
    return el;
}

function navigate(direction) {
    const next = currentCard + direction;
    if (next >= 0 && next < totalCards) updateCard(next);
}

function updateCard(index) {
    document.querySelectorAll('.card').forEach((c, i) => {
        c.classList.remove('active', 'prev');
        if (i === index) c.classList.add('active');
        else if (i < index) c.classList.add('prev');
    });
    document.querySelectorAll('.progress-segment').forEach((s, i) => {
        s.classList.remove('active', 'viewed');
        if (i === index) s.classList.add('active');
        else if (i < index) s.classList.add('viewed');
    });
    currentCard = index;
    document.getElementById('counter').textContent = `${index + 1} / ${totalCards}`;
    document.getElementById('prevBtn').disabled = index === 0;
    document.getElementById('nextBtn').disabled = index === totalCards - 1;
}

function openModal(term, type, content) {
    const typeLabels = { 'definition': 'Definition', 'context': 'Context', 'why-it-matters': 'Why It Matters', 'related': 'Related' };
    modalTerm.textContent = term;
    modalType.textContent = typeLabels[type] || type;
    modalContent.textContent = content;
    modalOverlay.classList.add('active');
}

function closeModal() { modalOverlay.classList.remove('active'); }

init();
</script>
</body>
</html>
